services:
  # ---------------------------------------------------------------------------
  # Backend Web Service
  # ---------------------------------------------------------------------------
  - type: web
    name: college-erp-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # User provides in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # User provides after frontend is deployed

  # ---------------------------------------------------------------------------
  # Frontend Static Site
  # ---------------------------------------------------------------------------
  - type: web
    name: college-erp-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # User provides (Backend URL + /api)
